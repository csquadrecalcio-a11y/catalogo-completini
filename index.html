<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completini Squadre Calcio 2.0</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;color:#222;font-family:'Roboto',sans-serif;min-height:100vh;}

/* ── ANIMAZIONI ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes ripple{to{transform:scale(4);opacity:0;}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulse-blue{0%,100%{box-shadow:0 0 0 0 rgba(13,71,161,.4);}50%{box-shadow:0 0 0 8px rgba(13,71,161,0);}}

.page-enter{animation:fadeInUp .35s ease both;}
.page-enter .cat-card,.page-enter .album-card,.page-enter .photo-item{opacity:0;animation:fadeInUp .35s ease both;}

.ripple-container{position:relative;overflow:hidden;}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(13,71,161,.18);transform:scale(0);animation:ripple .55s linear;pointer-events:none;}

.sb-item{transition:background .15s,border-left .15s,padding-left .2s;}
.sb-item:hover{padding-left:22px;}
.sb-subitem{transition:background .15s,padding-left .2s,color .15s;}
.sb-subitem:hover{padding-left:46px;}

/* ── TOP BAR ── */
.topbar{background:#0d47a1;padding:0 24px;height:58px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;min-width:200px;}
.topbar-logo img{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.5);}
.topbar-logo span{color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
.search-wrap{flex:1;max-width:500px;display:flex;gap:0;}
.search-wrap input{flex:1;padding:9px 14px;border:none;border-radius:4px 0 0 4px;font-size:14px;outline:none;background:#fff;}
.search-wrap button{background:#1565c0;color:#fff;border:none;padding:9px 20px;border-radius:0 4px 4px 0;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;}
.search-wrap button:hover{background:#0d47a1;}
.search-results{position:absolute;top:calc(100% + 2px);left:0;right:72px;background:#fff;border:1px solid #ddd;border-radius:4px;max-height:300px;overflow-y:auto;display:none;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.search-results.open{display:block;}
.search-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;border-bottom:1px solid #f0f0f0;}
.search-item:hover{background:#f5f5f5;}
.search-item .si-path{color:#888;font-size:12px;}
.search-pos{position:relative;flex:1;max-width:500px;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 58px);}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:#fff;border-right:1px solid #e0e0e0;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:#ccc;}
.sb-header{padding:12px 16px;font-size:13px;font-weight:700;color:#333;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;}
.sb-item{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;color:#333;border-bottom:1px solid #f0f0f0;transition:background .15s;}
.sb-item:hover{background:#e3f2fd;}
.sb-item.active{background:#e3f2fd;color:#0d47a1;font-weight:500;}
.sb-item .sb-flag{font-size:13px;min-width:24px;max-width:24px;}
.sb-item .sb-flag img{width:24px;height:auto;border-radius:2px;display:block;}
.sb-item .sb-name{flex:1;}
.sb-item .sb-arrow{color:#aaa;font-size:12px;}
.sb-item.active .sb-arrow{color:#0d47a1;}
.sb-sub{display:none;background:#fafafa;}
.sb-sub.open{display:block;}
.sb-subitem{padding:8px 16px 8px 40px;cursor:pointer;font-size:13px;color:#555;border-bottom:1px solid #f0f0f0;transition:background .15s;}
.sb-subitem:hover{background:#e3f2fd;color:#0d47a1;}
.sb-subitem.active{background:#e3f2fd;color:#0d47a1;font-weight:500;}

/* ── CONTENT ── */
.content{flex:1;padding:16px 20px;min-width:0;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;margin-bottom:12px;flex-wrap:wrap;}
.breadcrumb span{cursor:pointer;color:#0d47a1;}
.breadcrumb span:hover{text-decoration:underline;}
.breadcrumb .sep{color:#aaa;}
.breadcrumb .cur{color:#333;cursor:default;}
.breadcrumb .cur:hover{text-decoration:none;}

.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e0e0e0;}
.content-title{font-size:14px;color:#555;}
.content-title b{color:#222;}

/* ── GRIGLIA ALBUM ── */
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}
.album-card{background:#fff;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;transition:box-shadow .2s;overflow:hidden;}
.album-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);border-color:#aaa;}
.album-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0f0f0;}
.album-thumb-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#f0f0f0;font-size:40px;}
.album-info{padding:8px 10px;}
.album-name{font-size:13px;color:#333;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.album-count{font-size:12px;color:#888;margin-top:3px;}

/* ── GRIGLIA FOTO ── */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}
.photo-item{background:#fff;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;overflow:hidden;transition:box-shadow .2s;}
.photo-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);}
.photo-item img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}

/* ── CATEGORY GRID (home) ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.cat-card{background:#fff;border:1px solid #e0e0e0;border-radius:4px;padding:20px 16px;cursor:pointer;text-align:center;transition:box-shadow .2s;}
.cat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);border-color:#0d47a1;}
.cat-icon{font-size:32px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;}
.cat-icon img{width:52px;height:auto;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.cat-name{font-size:13px;font-weight:500;color:#333;}
.cat-count{font-size:12px;color:#888;margin-top:2px;}

/* ── BANNER NUOVI ARRIVI ── */
.na-banner{position:relative;width:100%;height:220px;border-radius:10px;overflow:hidden;cursor:pointer;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.na-banner img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;transition:transform .5s ease;}
.na-banner:hover img{transform:scale(1.04);}
.na-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.55) 0%,rgba(0,10,40,.3) 100%);}
.na-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:30px 36px;}
.na-badge{background:#1565c0;color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:3px;margin-bottom:10px;text-transform:uppercase;}
.na-title{font-size:clamp(26px,4vw,44px);font-weight:900;color:#fff;letter-spacing:3px;text-transform:uppercase;text-shadow:0 2px 12px rgba(0,0,0,.5);line-height:1.1;}
.na-sub{font-size:13px;color:rgba(255,255,255,.8);letter-spacing:2px;margin-top:6px;text-transform:uppercase;}
.na-btn{margin-top:16px;background:#fff;color:#0d47a1;padding:9px 22px;border-radius:4px;font-size:13px;font-weight:700;letter-spacing:1px;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.na-banner:hover .na-btn{background:#0d47a1;color:#fff;}
.na-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);transition:left .6s ease;}
.na-banner:hover .na-shine{left:130%;}
@media(max-width:600px){.na-banner{height:160px;}.na-content{padding:16px 20px;}.na-btn{display:none;}}

/* ── BACK BTN ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #ddd;color:#0d47a1;padding:7px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:14px;transition:all .2s;}
.back-btn:hover{background:#e3f2fd;border-color:#0d47a1;}

/* ── LOADING ── */
.loading{text-align:center;padding:60px 20px;color:#888;}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#0d47a1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center;padding:60px 70px;}
.lightbox.active{display:flex;}
.lightbox img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;border-radius:4px;display:block;}
.lb-close{position:absolute;top:16px;right:16px;background:#0d47a1;border:none;color:white;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:white;width:46px;height:46px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.3);}
.lb-prev{left:16px;}.lb-next{right:16px;}
.lb-counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;padding:4px 12px;border-radius:20px;font-size:13px;}

/* ── WHATSAPP BTN ── */
.wa-btn{position:fixed;bottom:24px;right:24px;z-index:500;background:#25d366;color:#fff;border:none;border-radius:50px;padding:14px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,.5);font-size:15px;font-weight:700;text-decoration:none;transition:all .25s;}
.wa-btn:hover{background:#1ebe5d;transform:translateY(-3px);box-shadow:0 8px 28px rgba(37,211,102,.6);}
.wa-btn svg{width:24px;height:24px;fill:#fff;flex-shrink:0;}
@keyframes wa-pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.5);}50%{box-shadow:0 4px 30px rgba(37,211,102,.9);}}
.wa-btn{animation:wa-pulse 2s ease infinite;}

/* ── PALLINO NUOVI ARRIVI SIDEBAR ── */
.sb-new-dot{width:8px;height:8px;background:#e53935;border-radius:50%;flex-shrink:0;}
@keyframes dot-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.4);}}
.sb-new-dot{animation:dot-pulse 1.4s ease infinite;}

/* ── FOOTER ── */
footer{background:#0d47a1;color:#fff;padding:32px 24px 20px;margin-top:auto;}
.footer-inner{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;gap:32px;justify-content:space-between;align-items:flex-start;}
.footer-brand{display:flex;align-items:center;gap:12px;}
.footer-brand img{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,.4);}
.footer-brand-name{font-size:16px;font-weight:700;letter-spacing:.5px;}
.footer-brand-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;}
.footer-links{display:flex;flex-direction:column;gap:10px;}
.footer-links a{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:8px;transition:color .2s;}
.footer-links a:hover{color:#fff;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.15);margin-top:24px;padding-top:14px;text-align:center;font-size:12px;color:rgba(255,255,255,.5);}

/* ── FOTO REALI CARD ── */
.album-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0f0f0;}

/* ── DARK MODE ── */
body.dark{background:#121212;color:#e0e0e0;}
body.dark .sidebar{background:#1e1e1e;border-color:#333;}
body.dark .sb-header{border-color:#333;color:#ccc;}
body.dark .sb-item{color:#ccc;border-color:#2a2a2a;}
body.dark .sb-item:hover,body.dark .sb-item.active{background:#2a3a5c;color:#90caf9;}
body.dark .sb-sub{background:#181818;}
body.dark .sb-subitem{color:#aaa;border-color:#2a2a2a;}
body.dark .sb-subitem:hover,body.dark .sb-subitem.active{background:#2a3a5c;color:#90caf9;}
body.dark .content-header{border-color:#333;}
body.dark .album-card,body.dark .photo-item,body.dark .cat-card,body.dark .back-btn{background:#1e1e1e;border-color:#333;}
body.dark .album-card:hover,body.dark .cat-card:hover{border-color:#1565c0;box-shadow:0 4px 16px rgba(21,101,192,.3);}
body.dark .album-name,body.dark .cat-name{color:#e0e0e0;}
body.dark .album-count,body.dark .cat-count,body.dark .content-title{color:#888;}
body.dark .breadcrumb .cur{color:#e0e0e0;}
body.dark .loading{color:#666;}
body.dark .album-thumb-placeholder{background:#2a2a2a;}
body.dark footer{background:#0a2a6e;}
body.dark .search-wrap input{background:#2a2a2a;color:#e0e0e0;}
body.dark .search-results{background:#1e1e1e;border-color:#333;}
body.dark .search-item{border-color:#2a2a2a;}
body.dark .search-item:hover{background:#2a2a2a;}

/* ── TOGGLE DARK ── */
.dark-toggle{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:auto;}
.dark-toggle:hover{background:rgba(255,255,255,.15);}

/* ── RISULTATI RICERCA FOTO ── */
.search-foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;margin-top:8px;}
.search-foto-item{background:#fff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
body.dark .search-foto-item{background:#1e1e1e;border-color:#333;}
.search-foto-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);}
.search-foto-item img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.search-foto-label{padding:6px 8px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── ZOOM LIGHTBOX ── */
.lightbox img{cursor:zoom-in;transition:transform .3s ease;}
.lightbox img.zoomed{cursor:zoom-out;transform:scale(2);transform-origin:var(--zoom-x,50%) var(--zoom-y,50%);}
.lb-zoom-hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;}
.lb-zoom-hint.show{opacity:1;}

/* ── LIGHTBOX ORDINA BTN ── */
.lb-order-btn{position:absolute;top:16px;left:16px;background:#25d366;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;transition:all .2s;z-index:10;}
.lb-order-btn:hover{background:#1ebe5d;transform:scale(1.05);}
.lb-order-btn svg{width:18px;height:18px;fill:#fff;flex-shrink:0;}

/* ── COME ORDINARE ── */
.how-section{background:#fff;border-radius:10px;padding:28px 24px;margin-bottom:24px;border:1px solid #e0e0e0;}
body.dark .how-section{background:#1e1e1e;border-color:#333;}
.how-title{font-size:18px;font-weight:700;color:#0d47a1;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
body.dark .how-title{color:#90caf9;}
.how-steps{display:flex;gap:16px;flex-wrap:wrap;}
.how-step{flex:1;min-width:160px;text-align:center;padding:16px 12px;background:#f5f9ff;border-radius:8px;border:1px solid #e3f2fd;position:relative;}
body.dark .how-step{background:#1a2a4a;border-color:#2a3a5c;}
.how-step-num{width:32px;height:32px;background:#0d47a1;color:#fff;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.how-step-icon{font-size:28px;margin-bottom:8px;}
.how-step-title{font-size:14px;font-weight:700;color:#222;margin-bottom:4px;}
body.dark .how-step-title{color:#e0e0e0;}
.how-step-desc{font-size:12px;color:#666;}
body.dark .how-step-desc{color:#888;}
.how-step-arrow{position:absolute;right:-10px;top:50%;transform:translateY(-50%);color:#0d47a1;font-size:20px;font-weight:700;z-index:1;}

/* ── BANNER SCORREVOLE ── */
.ticker{background:#0d47a1;color:#fff;padding:7px 0;overflow:hidden;white-space:nowrap;font-size:13px;font-weight:500;letter-spacing:.5px;}
.ticker-inner{display:inline-flex;gap:0;animation:ticker 25s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
.ticker-item{padding:0 32px;}
.ticker-sep{opacity:.5;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ── TORNA SU ── */
.scroll-top{position:fixed;bottom:24px;left:24px;z-index:500;background:#0d47a1;color:#fff;border:none;width:42px;height:42px;border-radius:50%;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(13,71,161,.4);transition:all .2s;}
.scroll-top.show{display:flex;}
.scroll-top:hover{background:#1565c0;transform:translateY(-3px);}

/* ── SWIPE MOBILE ── */

/* ── HAMBURGER ── */
.ham{display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;}
.sidebar-overlay.open{display:block;}

@media(max-width:768px){
  .ham{display:block;}
  .topbar-logo span{display:none;}
  .sidebar{position:fixed;left:-210px;top:58px;height:calc(100vh - 58px);z-index:95;transition:left .3s;}
  .sidebar.open{left:0;}
  .content{padding:12px;}
  .album-grid,.photo-grid,.cat-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
}
</style>
</head>
<body>

<!-- BANNER SCORREVOLE -->
<div class="ticker">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <button class="ham" onclick="toggleSidebar()">☰</button>
  <a class="topbar-logo" href="#" onclick="goHome();return false;">
    <img src="logo.png" alt="logo" onerror="this.src='logo.jpg'">
    <span>Completini Squadre Calcio 2.0</span>
  </a>

    if(i===navStack.length-1) html+=`<span class="cur">${item.name}</span>`;
    else html+=`<span onclick="goToLevel(${i})">${item.name}</span>`;
  });
  document.getElementById('breadcrumb').innerHTML=html;
}

function goToLevel(idx){
  navStack=navStack.slice(0,idx+1);
  updateBreadcrumb();
  const item=navStack[navStack.length-1];
  if(item.type==='cat') renderCategory(item.cat,item.ci);
  else if(item.type==='sub') renderSub(item.sub,item.cat,item.ci,item.si);
}

// ── CATEGORIA ────────────────────────────────────────────────────────────────
function openCategory(ci){
  const cat=CATALOG[ci];
  navStack=[{name:cat.name,type:'cat',cat,ci}];
  updateBreadcrumb();setSidebarActive(ci);
  renderCategory(cat,ci);
}
function openCatSidebar(ci){openCategory(ci);if(window.innerWidth<=768)toggleSidebar();}
function openSubSidebar(ci,si){openSub(ci,si);if(window.innerWidth<=768)toggleSidebar();}

async function renderCategory(cat,ci){
  const main=document.getElementById('main');
  const back=`<button class="back-btn" onclick="goHome()">← Indietro</button>`;

  if(cat.subs===null){
    if(!cat.id){main.innerHTML=back+`<div class="loading">Prossimamente...</div>`;return;}
    main.innerHTML=back+`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
    const subs=await getSubfolders(cat.id);
    if(subs.length>0){
      main.innerHTML=back+`<div class="content-header"><div class="content-title">In totale <b>${subs.length}</b> elementi</div></div>`+await buildAlbumGrid(subs,async(sub)=>`openDynamicSub('${sub.id}','${esc(sub.name)}','${esc(cat.name)}')`);
    } else {
      const imgs=await getImages(cat.id);
      renderPhotos(imgs,cat.name,back);
    }
    return;
  }

  if(!cat.subs||!cat.subs.length){
    if(!cat.id){main.innerHTML=back+`<div class="loading">Prossimamente...</div>`;return;}
    main.innerHTML=back+`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
    const imgs=await getImages(cat.id);
    renderPhotos(imgs,cat.name,back);
    return;
  }

  let html=back+`<div class="content-header"><div class="content-title">In totale <b>${cat.subs.length}</b> squadre</div></div><div class="album-grid">`;
  cat.subs.forEach((sub,si)=>{
    const sn=typeof sub==='string'?sub:sub.name;
    html+=`<div class="album-card" id="card-${ci}-${si}" onclick="openSub(${ci},${si})">
      <div class="album-thumb-placeholder" id="thumb-${ci}-${si}">${teamIcon(sn)}</div>
      <div class="album-info"><div class="album-name">${sn}</div></div>
    </div>`;
  });
  main.innerHTML=html+`</div>`;
  // Carica foto reali in background
  cat.subs.forEach(async(sub,si)=>{
    const sn=typeof sub==='string'?sub:sub.name;
    if(!cat.id) return;
    const found=await getSubfolderByName(cat.id,sn);
    if(!found) return;
    const imgs=await getImages(found.id);
    if(!imgs||!imgs.length) return;
    const el=document.getElementById(`thumb-${ci}-${si}`);
    if(!el) return;
    const img=document.createElement('img');
    img.className='album-card-img';
    img.src=thumbUrl(imgs[0].id);
    img.alt=sn;
    img.loading='lazy';
    img.style.cssText='opacity:0;transition:opacity .4s;';
    img.onload=()=>{img.style.opacity='1';};
    el.replaceWith(img);
  });
}

// ── SOTTOCATEGORIA ───────────────────────────────────────────────────────────
async function openSub(ci,si){
  const cat=CATALOG[ci];const sub=cat.subs[si];
  const sn=typeof sub==='string'?sub:sub.name;
  navStack=[{name:cat.name,type:'cat',cat,ci},{name:sn,type:'sub',sub,cat,ci,si}];
  updateBreadcrumb();setSidebarActive(ci,si);
  await renderSub(sub,cat,ci,si);
}

async function renderSub(sub,cat,ci,si){
  const main=document.getElementById('main');
  const sn=typeof sub==='string'?sub:sub.name;
  const back=`<button class="back-btn" onclick="goToLevel(0)">← ${cat.name}</button>`;
  main.innerHTML=back+`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
  if(!cat.id){main.innerHTML=back+`<div class="loading">Prossimamente...</div>`;return;}
  const found=await getSubfolderByName(cat.id,sn);
  if(!found){main.innerHTML=back+`<div class="loading">Nessuna foto trovata</div>`;return;}

  // Controlla se ci sono sottocartelle (es. home/away/third)
  const subsubs=await getSubfolders(found.id);
  if(subsubs.length>0){
    main.innerHTML=back+`<div class="content-header"><div class="content-title"><b>${sn}</b> — ${subsubs.length} elementi</div></div>`+await buildAlbumGrid(subsubs,async(s)=>`openDynamicSub('${s.id}','${esc(s.name)}','${esc(sn)}')`);
  } else {
    const imgs=await getImages(found.id);
    renderPhotos(imgs,sn,back);
  }
}

async function openDynamicSub(folderId,folderName,catName){
  const main=document.getElementById('main');
  const back=`<button class="back-btn" onclick="history.back()">← ${catName}</button>`;
  main.innerHTML=back+`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
  const subs=await getSubfolders(folderId);
  if(subs.length>0){
    main.innerHTML=back+`<div class="content-header"><div class="content-title"><b>${folderName}</b> — ${subs.length} elementi</div></div>`+await buildAlbumGrid(subs,async(s)=>`openDynamicSub('${s.id}','${esc(s.name)}','${esc(folderName)}')`);
  } else {
    const imgs=await getImages(folderId);
    renderPhotos(imgs,folderName,back);
  }
}

async function buildAlbumGrid(items,actionFn){
  let html=`<div class="album-grid">`;
  for(const item of items){
    const action=await actionFn(item);
    html+=`<div class="album-card" onclick="${action}">
      <div class="album-thumb-placeholder">${teamIcon(item.name)}</div>
      <div class="album-info"><div class="album-name">${item.name}</div></div>
    </div>`;
  }
  return html+`</div>`;
}

// ── FOTO ─────────────────────────────────────────────────────────────────────
function renderPhotos(imgs,title,back){
  const main=document.getElementById('main');
  currentPhotos=imgs;
  if(!imgs||!imgs.length){
    main.innerHTML=back+`<div class="loading">Nessuna foto disponibile</div>`;return;
  }
  let html=back+`<div class="content-header"><div class="content-title"><b>${title}</b> — ${imgs.length} foto</div></div><div class="photo-grid">`;
  imgs.forEach((img,i)=>{
    html+=`<div class="photo-item" onclick="openLightbox(${i})">
      <img src="${thumbUrl(img.id)}" alt="${img.name}" loading="lazy">
    </div>`;
  });
  main.innerHTML=html+`</div>`;
}

// ── RICERCA ──────────────────────────────────────────────────────────────────
const SEARCH_INDEX=(()=>{
  const idx=[];
  CATALOG.forEach((cat,ci)=>{
    idx.push({label:cat.name,path:'',flag:cat.flag,action:()=>openCategory(ci)});
    if(cat.subs) cat.subs.forEach((s,si)=>{
      const sn=typeof s==='string'?s:s.name;
      idx.push({label:sn,path:cat.name,flag:teamIcon(sn),action:()=>openSub(ci,si)});
    });
  });
  return idx;
})();

function onSearch(q){
  const el=document.getElementById('searchResults');
  if(!q.trim()){el.classList.remove('open');return;}
  const matches=SEARCH_INDEX.filter(x=>x.label.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!matches.length){el.classList.remove('open');return;}
  el.innerHTML=matches.map((m,i)=>`
    <div class="search-item" onmousedown="searchGo(${i})">
      <span>${m.flag}</span>
      <div><div>${m.label}</div>${m.path?`<div class="si-path">${m.path}</div>`:''}</div>
    </div>`).join('');
  el._m=matches;el.classList.add('open');
}
function searchGo(i){
  document.getElementById('searchResults')._m[i].action();
  document.getElementById('searchInput').value='';
  closeSearch();
}

lbImg.addEventListener('dblclick',function(e){
  if(this.classList.contains('zoomed')){
    this.classList.remove('zoomed');
    return;
  }
  const rect=this.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width*100).toFixed(1)+'%';
  const y=((e.clientY-rect.top)/rect.height*100).toFixed(1)+'%';
  this.style.setProperty('--zoom-x',x);
  this.style.setProperty('--zoom-y',y);
  this.classList.add('zoomed');
});

// ── RICERCA FOTO ─────────────────────────────────────────────────────────────
async function cercaFoto(query){
  if(!query.trim()) return;
  const main=document.getElementById('main');
  navStack=[];updateBreadcrumb();setSidebarActive(-1);
  main.innerHTML=`<div class="content-header"><div class="content-title">Risultati per: <b>"${query}"</b></div></div><div class="loading"><div class="spinner"></div>Ricerca in corso...</div>`;

  // Cerca in tutte le cartelle che corrispondono alla query
  const risultati=[];
  const matches=SEARCH_INDEX.filter(x=>x.label.toLowerCase().includes(query.toLowerCase()));

  for(const m of matches.slice(0,5)){
    // Trova l'id della cartella
    let folderId=null;
    CATALOG.forEach((cat,ci)=>{
      if(cat.name.toLowerCase()===m.label.toLowerCase()) folderId=cat.id;
      if(cat.subs) cat.subs.forEach((s)=>{
        const sn=typeof s==='string'?s:s.name;
        if(sn.toLowerCase()===m.label.toLowerCase()) folderId=null; // gestito sotto
      });
    });

    if(!folderId){
      // È una sottocategoria, cerca la cartella
      for(const cat of CATALOG){
        if(!cat.subs||!cat.id) continue;
        const sub=cat.subs.find(s=>(typeof s==='string'?s:s.name).toLowerCase()===m.label.toLowerCase());
        if(sub){
          const sn=typeof sub==='string'?sub:sub.name;
          const found=await getSubfolderByName(cat.id,sn);
          if(found) folderId=found.id;
          break;
        }
      }
    }
    if(!folderId) continue;
    const imgs=await getImages(folderId);
    imgs.forEach(img=>risultati.push({img,label:m.label}));
    if(risultati.length>=40) break;
  }

  currentPhotos=risultati.map(r=>r.img);
  if(!risultati.length){
    main.innerHTML=`<div class="content-header"><div class="content-title">Risultati per: <b>"${query}"</b></div></div><div class="loading">Nessuna foto trovata</div>`;
    return;
  }
  let html=`<div class="content-header"><div class="content-title"><b>${risultati.length}</b> foto trovate per "${query}"</div></div><div class="search-foto-grid">`;
  risultati.forEach((r,i)=>{
    html+=`<div class="search-foto-item" onclick="openLightbox(${i})">
      <img src="${thumbUrl(r.img.id)}" alt="${r.label}" loading="lazy">
      <div class="search-foto-label">${r.label}</div>
    </div>`;
  });
  main.innerHTML=html+`</div>`;
  setTimeout(animateGrid,50);
}

// ── ANIMAZIONI ───────────────────────────────────────────────────────────────

// Ripple effect su click per cards e sidebar items
function addRipple(e){
  const el=e.currentTarget;
  el.classList.add('ripple-container');
  const rect=el.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  const x=e.clientX-rect.left-size/2;
  const y=e.clientY-rect.top-size/2;
  const rip=document.createElement('span');
  rip.className='ripple-effect';
  rip.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  el.appendChild(rip);
  rip.addEventListener('animationend',()=>rip.remove());
}

// Fade-in a cascata per gli elementi della griglia
function animateGrid(){
  const items=document.querySelectorAll('.cat-card,.album-card,.photo-item');
  items.forEach((el,i)=>{
    el.style.opacity='0';
    el.style.transform='translateY(16px)';
    el.style.transition='none';
    setTimeout(()=>{
      el.style.transition=`opacity .3s ease ${i*40}ms, transform .3s ease ${i*40}ms`;
      el.style.opacity='1';
      el.style.transform='translateY(0)';
    },10);
    el.addEventListener('click',addRipple,{once:true});
  });
}

// Fade del contenuto principale quando cambia pagina
function fadeContent(fn){
  const main=document.getElementById('main');
  main.style.transition='opacity .15s ease';
  main.style.opacity='0';
  setTimeout(()=>{
    fn();
    main.style.opacity='1';
    setTimeout(animateGrid,50);
  },150);
}
