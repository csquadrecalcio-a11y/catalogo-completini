<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completini Squadre Calcio 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a12;
    --bg2: #0d1525;
    --bg3: #111e35;
    --blue: #1a7fd4;
    --blue-light: #4da6f5;
    --blue-glow: rgba(26,127,212,0.3);
    --white: #ffffff;
    --gray: #8899bb;
    --gray-light: #c5d5ee;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--white); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:0;left:0;right:0;bottom:0; background:radial-gradient(ellipse at 20% 50%,rgba(26,127,212,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(26,127,212,.05) 0%,transparent 50%); pointer-events:none; z-index:0; }

  header { position:relative; z-index:10; text-align:center; padding:40px 20px 30px; border-bottom:1px solid rgba(26,127,212,.2); }
  .logo-wrap { display:inline-block; position:relative; margin-bottom:16px; }
  .logo-wrap::before { content:''; position:absolute; inset:-8px; border-radius:50%; background:radial-gradient(circle,var(--blue-glow) 0%,transparent 70%); animation:pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
  .logo-wrap img { width:120px; height:120px; border-radius:50%; border:3px solid var(--blue); position:relative; z-index:1; box-shadow:0 0 30px var(--blue-glow); }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,5vw,52px); letter-spacing:4px; background:linear-gradient(135deg,var(--white) 0%,var(--blue-light) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  header p { color:var(--blue-light); font-size:13px; letter-spacing:3px; text-transform:uppercase; margin-top:6px; }

  .breadcrumb { position:relative; z-index:10; padding:14px 30px; display:flex; align-items:center; gap:8px; font-size:13px; color:var(--gray); border-bottom:1px solid rgba(255,255,255,.05); flex-wrap:wrap; }
  .breadcrumb span { cursor:pointer; transition:color .2s; }
  .breadcrumb span:hover { color:var(--blue-light); }
  .breadcrumb .sep { color:var(--blue); }
  .breadcrumb .current { color:var(--white); font-weight:600; }

  main { position:relative; z-index:10; padding:30px; max-width:1400px; margin:0 auto; }
  .page-title { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:3px; color:var(--white); margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .page-title::after { content:''; flex:1; height:2px; background:linear-gradient(90deg,var(--blue) 0%,transparent 100%); border-radius:2px; }
  .page-subtitle { color:var(--gray); font-size:14px; margin-bottom:30px; letter-spacing:1px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:20px; }
  .card { background:var(--bg2); border:1px solid rgba(26,127,212,.15); border-radius:12px; padding:24px 20px; cursor:pointer; transition:all .3s; text-align:center; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,transparent,var(--blue),transparent); opacity:0; transition:opacity .3s; }
  .card:hover { border-color:var(--blue); background:var(--bg3); transform:translateY(-4px); box-shadow:0 12px 40px rgba(26,127,212,.2); }
  .card:hover::before { opacity:1; }
  .card-icon { font-size:42px; margin-bottom:12px; display:block; }
  .card-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--white); margin-bottom:4px; }
  .card-count { font-size:12px; color:var(--blue-light); letter-spacing:1px; }

  .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .photo-item { border-radius:10px; overflow:hidden; border:1px solid rgba(26,127,212,.1); cursor:pointer; transition:all .3s; background:var(--bg2); }
  .photo-item:hover { border-color:var(--blue); transform:scale(1.03); box-shadow:0 8px 30px rgba(26,127,212,.25); z-index:2; position:relative; }
  .photo-item img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }

  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:1000; align-items:center; justify-content:center; padding:20px; }
  .lightbox.active { display:flex; }
  .lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:8px; box-shadow:0 0 60px rgba(26,127,212,.3); }
  .lightbox-close { position:absolute; top:20px;right:20px; background:var(--blue); border:none; color:white; width:44px;height:44px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lightbox-prev,.lightbox-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(26,127,212,.5); border:none; color:white; width:50px;height:50px; border-radius:50%; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lightbox-prev { left:20px; } .lightbox-next { right:20px; }

  .loading { text-align:center; padding:60px; color:var(--gray); }
  .spinner { width:40px;height:40px; border:3px solid rgba(26,127,212,.2); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .back-btn { display:inline-flex; align-items:center; gap:8px; background:var(--bg3); border:1px solid rgba(26,127,212,.3); color:var(--blue-light); padding:10px 20px; border-radius:8px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; letter-spacing:1px; margin-bottom:24px; transition:all .2s; text-transform:uppercase; }
  .back-btn:hover { background:var(--blue); color:white; border-color:var(--blue); }

  footer { position:relative; z-index:10; text-align:center; padding:30px; color:var(--gray); font-size:13px; border-top:1px solid rgba(26,127,212,.1); margin-top:60px; }
  @media(max-width:600px) { main{padding:16px;} .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;} .photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));} }
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <img src="logo.jpg" alt="Completini Squadre Calcio 2.0">
  </div>
  <h1>Completini Squadre Calcio</h1>
  <p>2.0 • Dal 2018 • Catalogo Ufficiale</p>
</header>

<nav class="breadcrumb" id="breadcrumb">
  <span onclick="goHome()">🏠 Home</span>
</nav>

<main id="main"></main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="prevPhoto()">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-next" onclick="nextPhoto()">›</button>
</div>

<footer>© 2026 Completini Squadre Calcio 2.0 — Tutti i diritti riservati</footer>

<script>
// ── Struttura catalogo (da Google Drive) ─────────────
const CATALOG = [
  { name:"Serie A", icon:"<img src='https://flagcdn.com/w40/it.png' style='width:50px;border-radius:4px'>", id:"1PEPuubYWEiecIKwXbq9RZ1LuWNjEhzC2", subs:[
    "Atalanta","Bologna","Como","Fiorentina","Inter","Juventus","Lazio","Milan","Napoli","Roma"
  ]},
  { name:"Premier League", icon:"<img src='https://flagcdn.com/w40/gb-eng.png' style='width:50px;border-radius:4px'>", id:"1JWQkaYv5k_g3EDZid-fyuXtK0tG-6wNh", subs:[
    "Arsenal","Aston Villa","Chelsea","Liverpool","Manchester city","Manchester United","Newcastle","Nottingham forest","Tottenham"
  ]},
  { name:"Liga Spagnola", icon:"<img src='https://flagcdn.com/w40/es.png' style='width:50px;border-radius:4px'>", id:"1U99k-2ipIpo-SncvQB6NdAni6WwMTtvw", subs:[
    "Atletico Madrid","Barcellona","Betis","bilbao","Real Madrid","Valencia"
  ]},
  { name:"Bundesliga", icon:"<img src='https://flagcdn.com/w40/de.png' style='width:50px;border-radius:4px'>", id:"1ZLOCMotAK94cXh3NbHxTYWVn5-fnpS0R", subs:[
    "Bayer leverkusen","Bayern monaco","Borussia Dortmund","Borussia Mönchengladbach","Eintracht Frankfurt","RB Leipzig","Shalke 04","VfB Stuttgart","Werder bremen"
  ]},
  { name:"Ligue 1 Francia", icon:"<img src='https://flagcdn.com/w40/fr.png' style='width:50px;border-radius:4px'>", id:"15kPZPWyq9I7aUvGue95DuWoGK9MzDzz9", subs:[
    "LOSC Lille","AS Monaco","Marsiglia","Olympique Lyonnais","Paris fc","Paris Saint Germain"
  ]},
  { name:"Eredivisie", icon:"<img src='https://flagcdn.com/w40/nl.png' style='width:50px;border-radius:4px'>", id:"1yOdpCveN3hA3_bFS8RHsUKHKsjXJXfq3", subs:["Ajax"]},
  { name:"Nazionali 2026/2027", icon:"🌍", id:"17CcRia7q_4dViHPP93Tm0bfbm605gsmV", subs:null},
  { name:"NBA", icon:"🏀", id:"1tVjyRRsb8Jh0L6--dkaQyQfoZKvEEir_", subs:null},
  { name:"Tute", icon:"👕", id:"1A8ExrH2C2MA0HtiHeHMaW6zt058_6Oqm", subs:[
    {name:"tuta allenamento", subs:[]},
    {name:"tuta da passeggio", subs:[]},
    {name:"tute con cappuccio", subs:[]}
  ]},
  { name:"Completi estivi da passeggio", icon:"☀️", id:"1atP3ewNSScU2eR8RlHWBqs5lVci5HhEp", subs:null},
  { name:"Resto del Mondo", icon:"🌐", id:"13NLaWPvV-9ldy2e5jofbogaXKKT87o2G", subs:[
    "Boca juniors","Inter Miami","River Plate","Santos","Saudi Pro League"
  ]},
  { name:"Vintage", icon:"🏆", id:"1zI1CEJ4f8RXTovUzkfZoY_ifAUW5X9jS", subs:null},
  { name:"Scarpe", icon:"👟", id:"1MW7kVEJQW4lsh5cOLTZ0VvRGUkRMzVj1", subs:null},
];

const API_KEY = 'AIzaSyBFjNAIrUyOZeI7c3OxdD1gOtUeHlMjRjk';

// Stato navigazione
let navStack = [];
let currentPhotos = [];
let currentPhotoIdx = 0;

function thumbUrl(id){ return `https://drive.google.com/thumbnail?id=${id}&sz=w400`; }
function fullUrl(id){ return `https://drive.google.com/uc?export=view&id=${id}`; }

// ── Fetch immagini da Drive ───────────────────────────
async function getImages(folderId){
  try {
    const q = `'${folderId}' in parents and (mimeType='image/jpeg' or mimeType='image/png' or mimeType='image/webp') and trashed=false`;
    const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&orderBy=name&key=${API_KEY}&pageSize=200`;
    const r = await fetch(url);
    const d = await r.json();
    return d.files || [];
  } catch(e){ return []; }
}

async function getSubfolderByName(parentId, name){
  try {
    const q = `'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&key=${API_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    if(!d.files) return null;
    // cerca per nome case-insensitive
    const found = d.files.find(f => f.name.toLowerCase() === name.toLowerCase());
    return found ? found.id : null;
  } catch(e){ return null; }
}

// ── Rendering ─────────────────────────────────────────
function updateBreadcrumb(){
  const bc = document.getElementById('breadcrumb');
  let html = `<span onclick="goHome()">🏠 Home</span>`;
  navStack.forEach((item, i) => {
    html += `<span class="sep">›</span>`;
    if(i === navStack.length-1){
      html += `<span class="current">${item.name}</span>`;
    } else {
      html += `<span onclick="goToLevel(${i})">${item.name}</span>`;
    }
  });
  bc.innerHTML = html;
}

function goHome(){
  navStack = [];
  updateBreadcrumb();
  renderHome();
}

function goToLevel(idx){
  navStack = navStack.slice(0, idx+1);
  updateBreadcrumb();
  const item = navStack[navStack.length-1];
  if(item.type === 'category') renderCategory(item.data);
  else if(item.type === 'sub') renderSub(item.data, item.parentData);
}

function renderHome(){
  const main = document.getElementById('main');
  let html = `<div class="page-title">Catalogo</div><div class="page-subtitle">Seleziona una categoria</div><div class="grid">`;
  CATALOG.forEach((cat, i) => {
    html += `<div class="card" onclick="openCategory(${i})">
      <span class="card-icon">${cat.icon}</span>
      <div class="card-name">${cat.name}</div>
    </div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
}

function openCategory(idx){
  const cat = CATALOG[idx];
  navStack = [{ name: cat.name, type:'category', data: cat }];
  updateBreadcrumb();
  renderCategory(cat);
}

async function renderCategory(cat){
  const main = document.getElementById('main');
  
  let backBtn = `<button class="back-btn" onclick="goHome()">← Indietro</button>`;

  // Se non ha sottocartelle → mostra foto direttamente
  if(!cat.subs || cat.subs.length === 0){
    if(!cat.id){ 
      main.innerHTML = backBtn + `<div class="page-title">${cat.icon} ${cat.name}</div><div class="loading" style="color:var(--gray)">Prossimamente...</div>`;
      return;
    }
    main.innerHTML = backBtn + `<div class="page-title">${cat.icon} ${cat.name}</div><div class="loading"><div class="spinner"></div>Caricamento foto...</div>`;
    const imgs = await getImages(cat.id);
    renderPhotos(imgs, cat.name, cat.icon, backBtn);
    return;
  }

  // Ha sottocartelle → mostra griglia
  let html = backBtn + `<div class="page-title">${cat.icon} ${cat.name}</div><div class="page-subtitle">${cat.subs.length} elementi</div><div class="grid">`;
  cat.subs.forEach((sub, i) => {
    const subName = typeof sub === 'string' ? sub : sub.name;
    const icon = getTeamIcon(subName);
    html += `<div class="card" onclick="openSub(${CATALOG.indexOf(cat)}, ${i})">
      <span class="card-icon">${icon}</span>
      <div class="card-name">${subName}</div>
    </div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
}

async function openSub(catIdx, subIdx){
  const cat = CATALOG[catIdx];
  const sub = cat.subs[subIdx];
  const subName = typeof sub === 'string' ? sub : sub.name;
  
  navStack = [
    { name: cat.name, type:'category', data: cat },
    { name: subName, type:'sub', data: sub, parentData: cat }
  ];
  updateBreadcrumb();
  await renderSub(sub, cat);
}

async function renderSub(sub, cat){
  const main = document.getElementById('main');
  const subName = typeof sub === 'string' ? sub : sub.name;
  const backBtn = `<button class="back-btn" onclick="goToLevel(0)">← ${cat.name}</button>`;

  main.innerHTML = backBtn + `<div class="page-title">${getTeamIcon(subName)} ${subName}</div><div class="loading"><div class="spinner"></div>Caricamento foto...</div>`;

  if(!cat.id){ 
    main.innerHTML = backBtn + `<div class="page-title">${getTeamIcon(subName)} ${subName}</div><div class="loading" style="color:var(--gray)">Prossimamente...</div>`;
    return;
  }

  // Cerca la sottocartella per nome
  const subFolderId = await getSubfolderByName(cat.id, subName);
  if(!subFolderId){
    main.innerHTML = backBtn + `<div class="page-title">${getTeamIcon(subName)} ${subName}</div><div class="loading" style="color:var(--gray)">Nessuna foto trovata</div>`;
    return;
  }

  const imgs = await getImages(subFolderId);
  renderPhotos(imgs, subName, getTeamIcon(subName), backBtn);
}

function renderPhotos(imgs, title, icon, backBtn){
  const main = document.getElementById('main');
  currentPhotos = imgs;

  if(!imgs || imgs.length === 0){
    main.innerHTML = backBtn + `<div class="page-title">${icon} ${title}</div><div class="loading" style="color:var(--gray)">Nessuna foto disponibile</div>`;
    return;
  }

  let html = backBtn + `<div class="page-title">${icon} ${title}</div><div class="page-subtitle">${imgs.length} foto</div><div class="photo-grid">`;
  imgs.forEach((img, i) => {
    html += `<div class="photo-item" onclick="openLightbox(${i})">
      <img src="${thumbUrl(img.id)}" alt="${img.name}" loading="lazy">
    </div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
}

// ── Icone squadre ─────────────────────────────────────
function getTeamIcon(name){
  const n = name.toLowerCase();
  if(n.includes('napoli')) return '🔵';
  if(n.includes('inter') && !n.includes('miami')) return '⚫';
  if(n.includes('milan') && !n.includes('inter')) return '🔴';
  if(n.includes('juventus')) return '⚪';
  if(n.includes('roma')) return '🟡';
  if(n.includes('lazio')) return '🩵';
  if(n.includes('atalanta')) return '🔵';
  if(n.includes('fiorentina')) return '💜';
  if(n.includes('bologna')) return '🔴';
  if(n.includes('como')) return '🔵';
  if(n.includes('arsenal')) return '🔴';
  if(n.includes('liverpool')) return '❤️';
  if(n.includes('manchester city')) return '🩵';
  if(n.includes('manchester united')) return '🔴';
  if(n.includes('chelsea')) return '🔵';
  if(n.includes('tottenham')) return '⚪';
  if(n.includes('newcastle')) return '⚫';
  if(n.includes('aston')) return '🟣';
  if(n.includes('real madrid')) return '⚪';
  if(n.includes('barcellon')) return '🔵';
  if(n.includes('atletico')) return '🔴';
  if(n.includes('paris') || n.includes('psg')) return '🔵';
  if(n.includes('bayern')) return '🔴';
  if(n.includes('borussia dortmund')) return '🟡';
  if(n.includes('ajax')) return '🔴';
  if(n.includes('boca')) return '🔵';
  if(n.includes('river')) return '⚪';
  if(n.includes('tuta') || n.includes('tute')) return '👕';
  if(n.includes('canotta')) return '🎽';
  if(n.includes('polo')) return '👔';
  return '⚽';
}

// ── Lightbox ──────────────────────────────────────────
function openLightbox(idx){
  currentPhotoIdx = idx;
  document.getElementById('lightbox-img').src = fullUrl(currentPhotos[idx].id);
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('active'); }
function prevPhoto(){ currentPhotoIdx=(currentPhotoIdx-1+currentPhotos.length)%currentPhotos.length; document.getElementById('lightbox-img').src=fullUrl(currentPhotos[currentPhotoIdx].id); }
function nextPhoto(){ currentPhotoIdx=(currentPhotoIdx+1)%currentPhotos.length; document.getElementById('lightbox-img').src=fullUrl(currentPhotos[currentPhotoIdx].id); }

document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); if(e.key==='ArrowLeft') prevPhoto(); if(e.key==='ArrowRight') nextPhoto(); });

// ── Init ──────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
